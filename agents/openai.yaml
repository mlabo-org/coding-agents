display_name: Coding Agents
short_description: Scope target-repo Coding Agents state, maintain a fixed role scaffold, issue supervised scoped assignment packets with finite delegation depth, audit, and enforce coding conduct plus debug/source-change gates.
default_prompt: Use coding-agents to resolve the jobsite from cwd or an explicit --target-cwd, maintain that target git root's <git-root>/.coding-agents/ workflow state, keep the target .git/info/exclude ignoring it without editing tracked .gitignore, treat docs/codex only as legacy migration input, record the fixed role scaffold without implying resident agents are active, issue scoped specialist assignment packets only when explicitly assigned or available, treat --feature-profile ids as optional scoped assignment overlays and not as extra agents or scaffold roles, treat --work-type ids as semantic command metadata for gate classification only with auto as the backwards-compatible default, source-change/debug forcing the metacognitive gate, and documentation suppressing keyword/path inference only for that command without downgrading existing gate-required workflow state, require run --runner codex-cli scopes to be machine-checkable via scope:v1 all, scope:v1 paths=<comma-separated repo-relative prefixes>, or legacy simple path-only scopes before runner state is appended or the process launches, suppress nested Coding Agents preflight in parent-managed child-worker material, require finite delegation hierarchy modes none, one_level, or n_level with max_depth, depth, and remaining_depth, require long-running or delegated assignment supervision fields for heartbeat interval/deadline, max silence, soft/hard timeout, no-interrupt-until, allowed cancel reasons, and self-report progress at heartbeat_interval with completed/current/blocker/ETA fields, treat pre-deadline silence as neutral for quiet workers only, treat explicit completed/blocked/failed worker output as an immediate collect/integrate/close-or-retire trigger, treat heartbeat/progress as telemetry rather than completion evidence, follow missed heartbeat -> soft ping/status request -> grace wait -> stale mark -> cancel/replace only if still silent or invalid, enforce the Coding Conduct Gate by reusing mature GitHub/npm OSS directly when it fits and dependency approval/scope permits it, starting bug analysis from first principles, and prohibiting fallback implementations that hide main-flow errors, enforce that debug or repair work identifies root cause and verifies the intended outcome, apply the metacognitive source-change/debug/repair gate for source-change, source-of-truth, plugin-contract, generated-artifact inconsistency, before/after context, and cross-feature consequences work, preserve parent ownership of policy and final integration, close or retire no-longer-needed subagents only under the supervision contract, and prepare a concise handoff without touching unrelated changes.
