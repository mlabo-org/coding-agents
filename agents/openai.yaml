display_name: Coding Agents
short_description: Scope target-repo Coding Agents state, maintain a fixed role scaffold, issue supervised scoped assignment packets with finite delegation depth, audit, and enforce coding conduct plus debug/source-change gates.
default_prompt: Use coding-agents for explicit Coding Agents intake, jobsite resolution from cwd or --target-cwd, and target git root .coding-agents workflow state. Keep .coding-agents in .git/info/exclude, not tracked .gitignore. Use scoped task_id/epoch/scope assignments, finite hierarchy, supervision/heartbeat rules, handoff/audit, Coding Conduct Gate, and source-change/debug root-cause gates. Treat docs/codex as legacy migration input only. Do not use for generic edits, cache refresh, marketplace changes, or activation unless explicitly in scope.
