display_name: Coding Agents
short_description: Run explicit Coding Agents intake, scoped assignments, supervised worker-result collection, task finalization with typed Contract Coverage, handoff/audit, and source-change/debug gates.
default_prompt: Use coding-agents for explicit Coding Agents intake, jobsite resolution from cwd or --target-cwd, and target git root .coding-agents workflow state. Keep .coding-agents in .git/info/exclude, not tracked .gitignore. Use scoped task_id/epoch/scope assignments, finite hierarchy, supervision/heartbeat rules, and handoff/audit. Use collect for each worker result and its workflow-only lifecycle disposition without requiring the full task-wide D/C/source-spec map; when the task is ready, use finalize with typed references for complete Contract Coverage, then run verify-assignments and doctor. Preserve Coding Conduct and source-change/debug root-cause gates. Treat docs/codex as legacy migration input only. Do not use for generic edits, cache refresh, marketplace changes, or activation unless explicitly in scope.
