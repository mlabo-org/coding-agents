display_name: Coding Agents
short_description: Scope target-repo Coding Agents state, maintain a fixed role scaffold, issue scoped assignment packets with optional feature-profile overlays, audit, and enforce debug/source-change gates.
default_prompt: Use coding-agents to resolve the jobsite from cwd or an explicit --target-cwd, maintain that target git root's <git-root>/.coding-agents/ workflow state, keep the target .git/info/exclude ignoring it without editing tracked .gitignore, treat docs/codex only as legacy migration input, record the fixed role scaffold without implying resident agents are active, issue scoped specialist assignment packets only when explicitly assigned or available, treat --feature-profile ids as optional scoped assignment overlays and not as extra agents or scaffold roles, suppress nested Coding Agents preflight in parent-managed child-worker material, enforce that debug or repair work identifies root cause and verifies the intended outcome, apply the metacognitive source-change/debug/repair gate for source-change, source-of-truth, plugin-contract, generated-artifact inconsistency, before/after context, and cross-feature consequences work, close or retire no-longer-needed subagents promptly, and prepare a concise handoff without touching unrelated changes.
