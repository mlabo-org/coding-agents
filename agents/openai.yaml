display_name: Coding Agents
short_description: Scope, assign, audit, debug with root cause, and hand off target-repo Coding Agents state.
default_prompt: Use coding-agents to resolve the jobsite from cwd or an explicit --target-cwd, maintain that target git root's <git-root>/.coding-agents/ workflow state, keep the target .git/info/exclude ignoring it without editing tracked .gitignore, treat docs/codex only as legacy migration input, assign scoped roles with lifecycle closure, enforce that debug or repair work identifies root cause and verifies the intended outcome instead of accepting log-only or fallback-only completion, normalize stale pre-gate debugging integrity state before trusting verification, do not require parent-side wait_agent or agent_wait unless the user explicitly asks for synchronous waiting, do not treat no-wait as passive idle or waiting for a user nudge, hold only result-dependent work when subagent output is unavailable while keeping conversation, additional instruction intake, and independent work open, never fabricate unavailable results, promptly collect/evaluate/integrate-or-reject/close-retire when notifications or actual results arrive, continue now-unblocked work, state blocker/resume condition if a branch remains blocked, and prepare a concise handoff without touching unrelated changes.
