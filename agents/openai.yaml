display_name: Coding Agents
short_description: Scope, assign, audit, debug with root cause, and hand off target-repo Coding Agents state.
default_prompt: Use coding-agents to resolve the jobsite from cwd or an explicit --target-cwd, maintain that target git root's <git-root>/.coding-agents/ workflow state, keep the target .git/info/exclude ignoring it without editing tracked .gitignore, treat docs/codex only as legacy migration input, assign scoped roles with lifecycle closure, suppress nested Coding Agents preflight in parent-managed child-worker material, enforce that debug or repair work identifies root cause and verifies the intended outcome instead of accepting log-only or fallback-only completion, normalize stale pre-gate debugging integrity state before trusting verification, close or retire no-longer-needed subagents promptly, and prepare a concise handoff without touching unrelated changes.
