display_name: Coding Agents
short_description: Scope, assign, audit, debug root cause, and inspect context impact for target-repo Coding Agents state.
default_prompt: Use coding-agents to resolve the jobsite from cwd or an explicit --target-cwd, maintain that target git root's <git-root>/.coding-agents/ workflow state, keep the target .git/info/exclude ignoring it without editing tracked .gitignore, treat docs/codex only as legacy migration input, assign scoped roles with lifecycle closure, suppress nested Coding Agents preflight in parent-managed child-worker material, enforce that debug or repair work identifies root cause and verifies the intended outcome, apply the metacognitive repair/debug gate for source-of-truth, plugin-contract, generated-artifact inconsistency, before/after context, and cross-feature consequences work, close or retire no-longer-needed subagents promptly, and prepare a concise handoff without touching unrelated changes.
